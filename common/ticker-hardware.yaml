spi:
  clk_pin: D5
  mosi_pin: D7


output:
  - platform: esp8266_pwm
    id: buzzer
    pin: D1


rtttl:
  output: buzzer


display:
  - platform: max7219digit
    id: ticker_display
    cs_pin: D8
    num_chips: 4
    rotate_chip: 180
    reverse_enable: True
    intensity: 8
    update_interval: 67ms
    lambda: |-
      it.intensity(id(brightness).state);
      it.turn_on_off(id(page_number).state != 0);

      if (id(page_number).state == 1) {
        //
        // Page 1: Klok with font: 5x7 and all indicators and timestamp as bits
        //
        printSlideFormatWithFont(it, 5, 0, "%H:%M", id(hass_time).now(), 7);

        draw_presence_indicators(
          it,
          id(person_martijn).state,
          id(person_marjolein).state,
          id(person_abel).state
        );
        draw_contact_indicators(
          it,
          id(contact_voordeur).state,
          id(contact_achterdeur).state,
          id(contact_raam_martijn).state,
          id(contact_raam_abel).state,
          id(contact_raam_marjolein).state,
          id(contact_bergingdeur).state,
          id(contact_trapdeur).state,
          id(contact_achtergevel_raam).state
        );
        draw_timestamp_as_bits(it, id(hass_time).now());

      } else if (id(page_number).state == 2) {
        //
        // Page 2: Klok with font: 3x6 and timestamp as bits
        //
        auto time_now = id(hass_time).now();
        printTimestampAsHex(it, 1, 1, time_now);

        draw_timestamp_as_bits(it, time_now);

      } else if (id(page_number).state == 3) {
        //
        // Page 3: Klok with font: 5x7 and all indicators
        //
        printSlideTime(it, 5, 0, id(hass_time).now());

        draw_presence_indicators(
          it,
          id(person_martijn).state,
          id(person_marjolein).state,
          id(person_abel).state
        );

        draw_contact_indicators(
          it,
          id(contact_voordeur).state,
          id(contact_achterdeur).state,
          id(contact_raam_martijn).state,
          id(contact_raam_abel).state,
          id(contact_raam_marjolein).state,
          id(contact_bergingdeur).state,
          id(contact_trapdeur).state,
          id(contact_achtergevel_raam).state
        );

      } else if (id(page_number).state == 4) {
        //
        // Page 4: Klok with font: 4x7
        //
        printSlideFormatWithFont(it, 0, 0, "%H|%M|%S", id(hass_time).now(), 4);

      } else if (id(page_number).state == 5) {
        //
        // Page 5: Klok with font: 3x7
        //
        printSlideFormatWithFont(it, 4, 0, "%H:%M:%S", id(hass_time).now(), 3);
        
        draw_presence_indicators(
          it,
          id(person_martijn).state,
          id(person_marjolein).state,
          id(person_abel).state
        );

      } else if (id(page_number).state == 6) {
        //
        // Page 6: Powerusage
        //
        printNumberWithFont(it, 0, 0, "%d", id(current_power_usage).state, 5);

      } else if (id(page_number).state == 7) {
        //
        // Page 7: (Not in cycle) Show alert message
        //
        it.printf(0,0, id(font_press), TextAlign::TOP_LEFT, "%s...", id(glob_alert_message).c_str());
        auto scrollmode = id(scroll_mode).index_of(id(scroll_mode).current_option()) == 0 ? esphome::max7219digit::ScrollMode::CONTINUOUS : esphome::max7219digit::ScrollMode::STOP;
        it.scroll(true, scrollmode, id(glob_alert_speed), id(scroll_delay).state, id(scroll_dwell).state);
      }


