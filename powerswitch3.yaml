substitutions:
  devicename: powerswitch3
  friendly_name: Sonoff Powerswitch 3


packages:
  wifi: !include common/wifi.yaml
  always: !include common/always.yaml


esphome:
  name: $devicename


api:
    encryption:
        key: !secret powerswitch3_api_encryption_key


esp8266:
  board: esp01_1m
  board_flash_mode: dout


binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: True
    name: Button
    on_press:
      - switch.toggle: fakebutton

  - platform: template
    name: Running
    filters:
      - delayed_off: 15s
    lambda: |-
      if (isnan(id(power).state)) {
        return {};
      } else if (id(power).state > 4) {
        // Running
        return true;
      } else {
        // Not running
        return false;
      }


sensor:
  - platform: hlw8012
    sel_pin: 5
    cf_pin: 14
    cf1_pin: 13
    update_interval: 2s
    current:
      name: Current
    voltage:
      name: Voltage
    power:
      id: power
      name: Power
      on_value_range:
        - above: 4.0
          then:
            - light.turn_on: led
        - below: 3.0
          then:
            - light.turn_off: led

switch:
  - platform: template
    id: fakebutton
    name: Relay
    optimistic: true
    turn_on_action:
      - switch.turn_on: relay
      - light.turn_on: led
    turn_off_action:
      - switch.turn_off: relay
      - light.turn_off: led

  - platform: gpio
    id: relay
    pin: GPIO12


output:
  - platform: esp8266_pwm
    id: pow_blue_led
    pin:
      number: GPIO15


light:
  - platform: monochromatic
    id: led
    name: Blue LED
    output: pow_blue_led
